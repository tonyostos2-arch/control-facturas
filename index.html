<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Inteligente de Facturas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Gestor Inteligente 🤖📑</h1>
        </header>

        <section class="ocr-section">
            <h2>Escanear Factura</h2>
            <p class="instruction">Toca el botón para activar la cámara, toma la foto de la factura y el sistema extraerá los datos automáticamente.</p>
            
            <label for="invoice-file" class="btn-camera-trigger">📷 Tomar Foto Factura</label>
            <input type="file" id="invoice-file" accept="image/*" capture="environment" style="display: none;">
            
            <div id="status" class="status">Esperando fotografía...</div>
            
            <div class="form-invoice">
                <label>Cliente:</label>
                <input type="text" id="invoice-client" placeholder="Nombre del cliente">

                <label>Proveedor / Emisor:</label>
                <input type="text" id="invoice-provider" placeholder="¿Quién emite la factura?">
                
                <label>Monto Total ($):</label>
                <input type="text" id="invoice-amount" placeholder="Monto ($)">
                
                <button type="button" id="add-invoice-btn" class="btn-success">Confirmar y Guardar Factura</button>
            </div>
        </section>

        <hr>

        <section class="lists-section">
            <h2>Historial de Cuentas 🔍</h2>
            
            <label for="filter-client">Filtrar por Cliente:</label>
            <select id="filter-client">
                <option value="todos">Todos los clientes</option>
            </select>

            <h3 class="list-title pending">Por Pagar ⏳</h3>
            <ul id="pending-list" class="invoice-list"></ul>

            <h3 class="list-title paid">Canceladas ✅</h3>
            <ul id="paid-list" class="invoice-list"></ul>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
